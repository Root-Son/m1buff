name: 데이터 자동 동기화

on:
  schedule:
    - cron: '30 21 * * *'  # KST 06:30
    - cron: '30 4 * * *'   # KST 13:30
    - cron: '30 8 * * *'   # KST 17:30
    - cron: '30 14 * * *'  # KST 23:30
  workflow_dispatch:  # 수동 실행 + Vercel Cron 백업

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: m1-dashboard
        run: |
          pip install requests pandas gspread oauth2client

      - name: Sync Data
        working-directory: m1-dashboard
        env:
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          REDASH_URL: ${{ secrets.REDASH_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/sync_data.py

      - name: Notify on failure
        if: failure()
        run: echo "동기화 실패! 로그를 확인하세요."
