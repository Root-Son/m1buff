name: 데이터 자동 동기화
on:
  schedule:
    # KST 07시 대비 → 06:30 시작 (UTC 21:30)
    - cron: '30 21 * * *'
    # KST 14시 대비 → 13:30 시작 (UTC 4:30)
    - cron: '30 4 * * *'
    # KST 18시 대비 → 17:30 시작 (UTC 8:30)
    - cron: '30 8 * * *'
    # KST 24시 대비 → 23:30 시작 (UTC 14:30)
    - cron: '30 14 * * *'
  workflow_dispatch:  # 수동 실행 가능
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests pandas gspread oauth2client
      - name: Sync Data
        env:
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          REDASH_URL: ${{ secrets.REDASH_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/sync_data.py
      - name: Notify on failure
        if: failure()
        run: echo "동기화 실패! 로그를 확인하세요."
